
services:
  lightrag:
    image: registry.git.sverk.io/mgg789/ragconnect/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile.lightrag
    restart: unless-stopped
    volumes:
      - lightrag_data:/data/lightrag
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LOCAL_EMBEDDING_MODE: ${LOCAL_EMBEDDING_MODE:-true}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      LOCAL_EMBEDDING_DIM: ${LOCAL_EMBEDDING_DIM:-384}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      PROXY_PORT: ${PROXY_PORT:-9622}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9621/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  server-gateway:
    image: registry.git.sverk.io/mgg789/ragconnect/backend:latest
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      lightrag:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - server_data:/data
    environment:
      LIGHTRAG_URL: http://lightrag:9621
      TOKEN_STORE_PATH: /data/server_tokens.yaml
      RAGCONNECT_ADMIN_USERNAME: ${RAGCONNECT_ADMIN_USERNAME:-admin}
      RAGCONNECT_ADMIN_PASSWORD: ${RAGCONNECT_ADMIN_PASSWORD}
      RAGCONNECT_HTTP_TIMEOUT_SECONDS: ${RAGCONNECT_HTTP_TIMEOUT_SECONDS:-600}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  lightrag_data:
  server_data:
