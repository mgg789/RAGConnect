version: "3.9"

# ---------------------------------------------------------------------------
# RAGConnect — Project Server stack
#
# Runs one isolated memory server for a single project.
# To host multiple projects, copy this file and change the port numbers.
#
# Quick start
# -----------
#   1. Copy .env.example to .env and fill in OPENAI_API_KEY
#   2. docker compose up -d
#   3. Create the first token:
#        docker compose exec server-gateway \
#            ragconnect-server token create --role write --description "Alice"
# ---------------------------------------------------------------------------

services:

  # --------------------------------------------------------------------------
  # LightRAG — knowledge graph + RAG backend
  # --------------------------------------------------------------------------
  lightrag:
    build:
      context: .
      dockerfile: Dockerfile.lightrag
    restart: unless-stopped
    volumes:
      - lightrag_data:/data/lightrag
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      # Separate embedding API (optional — falls back to OPENAI_API_KEY/BASE)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      # Local Jina embedding mode
      LOCAL_EMBEDDING_MODE: ${LOCAL_EMBEDDING_MODE:-false}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-jinaai/jina-embeddings-v2-small-en}
      LOCAL_EMBEDDING_DIM: ${LOCAL_EMBEDDING_DIM:-512}
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9621/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # LightRAG is internal-only in production deployments.

  # --------------------------------------------------------------------------
  # Server Gateway — token auth + LightRAG proxy
  # --------------------------------------------------------------------------
  server-gateway:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      lightrag:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - server_data:/data
    environment:
      LIGHTRAG_URL: http://lightrag:9621
      TOKEN_STORE_PATH: /data/server_tokens.yaml
      RAGCONNECT_ADMIN_USERNAME: ${RAGCONNECT_ADMIN_USERNAME:-admin}
      RAGCONNECT_ADMIN_PASSWORD: ${RAGCONNECT_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  lightrag_data:
  server_data:
