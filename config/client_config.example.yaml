# RAGConnect client config example.
# Copy to ~/.ragconnect/client_config.yaml or let the setup scripts create it.

destinations:
  # Local memory: default personal long-term memory.
  - url: http://127.0.0.1:9621
    display_name: Local memory
    enabled: true

  # Project memory: shared team memory selected by project_label.
  - label: your-project
    display_name: Your Project
    url: https://your-memory.example.com
    token: tok_replace_me
    enabled: true

default_project: null
remote_only_mode: false
strict_project_routing: false
