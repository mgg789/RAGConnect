# RAGConnect — Server Gateway token store example
#
# Copy this file to the path specified by TOKEN_STORE_PATH (default: server_tokens.yaml).
# Manage tokens with the CLI:
#
#   ragconnect-server token create --role write  --description "Alice"
#   ragconnect-server token create --role readonly --description "CI pipeline"
#   ragconnect-server token list
#   ragconnect-server token revoke tok_abc123
#
# Roles:
#   readonly  — search / read access only
#   write     — search + write / insert access

tokens:
  - token_id: tid_readonly_01
    token_hash: sha256_replace_me_readonly
    role: readonly
    enabled: true
    expires_at: "2027-01-01T00:00:00Z"
    description: "User Alice — readonly access"

  - token_id: tid_write_01
    token_hash: sha256_replace_me_write
    role: write
    enabled: true
    expires_at: "2027-01-01T00:00:00Z"
    description: "User Bob — write access"

  # Disabled token example (will be rejected by the server):
  # - token: tok_revoked_example
  #   role: write
  #   enabled: false
  #   description: "Former member — revoked"
